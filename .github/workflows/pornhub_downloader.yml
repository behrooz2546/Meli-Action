name: دانلودر پورن هاب

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL of the video'
        required: true
        type: string

      output_folder:
        description: 'Folder where the video will be saved'
        required: false
        type: string
        default: 'downloads'

      quality:
        description: 'Video quality (yt-dlp format selector)'
        required: true
        type: string
        default: 'bestvideo[height<=720]+bestaudio/best[ext=mp4]/best'

      archive_name:
        description: 'Base name for the RAR archive (if file is split)'
        required: false
        type: string
        default: 'video'

permissions:
  contents: write

jobs:
  download-and-maybe-split:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install tools
        run: |
          python -m pip install -U pip
          python -m pip install -U yt-dlp
          yt-dlp -U
          sudo apt-get update
          sudo apt-get install -y bc rar

      - name: Download video (retry up to 5 times)
        id: download
        shell: bash
        run: |
          FOLDER="${{ github.event.inputs.output_folder }}"

          mkdir -p "$FOLDER"

          touch marker

          MAX_RETRIES=5
          RETRY_COUNT=0
          SUCCESS=false

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do

            echo "Download attempt $((RETRY_COUNT+1))/$MAX_RETRIES"

            yt-dlp \
              --output "./$FOLDER/%(uploader)s - %(title)s - %(id)s.%(ext)s" \
              --format "${{ github.event.inputs.quality }}" \
              --merge-output-format mp4 \
              --retries 3 \
              --fragment-retries 10 \
              --no-check-certificate \
              --geo-bypass \
              --no-color \
              --ignore-errors \
              --newline \
              "${{ github.event.inputs.url }}" && {

                NEW_FILE=$(find "$FOLDER" -type f -newer marker -print -quit)

                if [ -n "$NEW_FILE" ]; then
                  echo "Download succeeded: $NEW_FILE"
                  SUCCESS=true
                  break
                else
                  echo "No new file found. Retrying..."
                fi
              } || {
                echo "Download failed with exit code $?"
              }

            RETRY_COUNT=$((RETRY_COUNT+1))

            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              echo "Waiting 5 seconds before retry..."
              sleep 5
            fi
          done

          if [ "$SUCCESS" = false ]; then
            echo "All download attempts failed."
            exit 1
          fi

          FILENAME=$(basename "$NEW_FILE")
          SIZE_BYTES=$(stat -c %s "$NEW_FILE")

          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "size_bytes=$SIZE_BYTES" >> $GITHUB_OUTPUT

      - name: Split file if larger than 49 MB
        id: split
        shell: bash
        run: |
          FOLDER="${{ github.event.inputs.output_folder }}"
          FILENAME="${{ steps.download.outputs.filename }}"
          SIZE_BYTES="${{ steps.download.outputs.size_bytes }}"

          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)
          THRESHOLD_MB=49

          cd "$FOLDER"

          if (( $(echo "$SIZE_MB > $THRESHOLD_MB" | bc -l) )); then

            echo "File exceeds threshold. Splitting into RAR parts..."

            RANDOM_HEX=$(openssl rand -hex 3)
            ARCHIVE_NAME="${{ github.event.inputs.archive_name }}_${RANDOM_HEX}"

            rar a -v45m -m5 -ep1 "${ARCHIVE_NAME}.rar" "$FILENAME"

            rm "$FILENAME"

          else
            echo "File size is below threshold. Keeping original file."
          fi

      - name: Commit and push downloaded files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${{ github.event.inputs.output_folder }}/"

          git commit -m "Add downloaded video files" || echo "Nothing to commit"

          git push

      - name: Generate links-video.txt after push
        shell: bash
        run: |
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          FOLDER="${{ github.event.inputs.output_folder }}"

          # ensure latest pushed state
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"

          FILES=$(find "$FOLDER" -type f | sort)

          # get clean base filename
          FIRST_FILE=$(echo "$FILES" | head -n 1)
          BASE_NAME=$(basename "$FIRST_FILE")

          BASE_NAME=$(echo "$BASE_NAME" | sed -E 's/(\.part[0-9]+\.rar|\.rar|\.mp4|\.mkv|\.webm|\.mov)$//')

          OUTPUT_FILE="links-${BASE_NAME}.txt"

          echo "Creating $OUTPUT_FILE"

          echo "Raw download links:" > "$OUTPUT_FILE"
          echo "" >> "$OUTPUT_FILE"

          echo "## 📥 Download Links" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          for FILE in $FILES; do
            RAW_URL="https://raw.githubusercontent.com/$REPO/$BRANCH/$FILE"

            # save into txt file
            echo "$RAW_URL" >> "$OUTPUT_FILE"

            # print in logs
            echo "$RAW_URL"

            # clickable links in summary
            echo "- [$FILE]($RAW_URL)" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Links file generated: $OUTPUT_FILE" >> $GITHUB_STEP_SUMMARY

          echo ""
          echo "Generated file:"
          cat "$OUTPUT_FILE"

      - name: Commit links file
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add links-*.txt

          git commit -m "Add generated links file" || echo "Nothing to commit"

          git push
