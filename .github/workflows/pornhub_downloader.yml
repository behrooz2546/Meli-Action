name: دانلودر پورن هاب

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL of the video'
        required: true
        type: string

      output_folder:
        description: 'Folder where the video will be saved'
        required: false
        type: string
        default: 'downloads'

      quality:
        description: 'Video quality (yt-dlp format selector)'
        required: true
        type: string
        default: 'bestvideo[height<=720]+bestaudio/best[ext=mp4]/best'

      archive_name:
        description: 'Base name for the RAR archive (if file is split)'
        required: false
        type: string
        default: 'video'

permissions:
  contents: write

jobs:
  download-and-maybe-split:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install tools
        run: |
          pip install yt-dlp
          sudo apt-get update
          sudo apt-get install -y bc rar

      - name: Download video (retry)
        id: download
        shell: bash
        run: |
          FOLDER="${{ github.event.inputs.output_folder }}"
          mkdir -p "$FOLDER"
          touch marker

          MAX_RETRIES=5
          RETRY=0
          SUCCESS=false

          while [ $RETRY -lt $MAX_RETRIES ]; do
            echo "Attempt $((RETRY+1))/$MAX_RETRIES"

            yt-dlp \
              --output "./$FOLDER/%(uploader)s - %(title)s - %(id)s.%(ext)s" \
              --format "${{ github.event.inputs.quality }}" \
              --merge-output-format mp4 \
              --retries 3 \
              --fragment-retries 10 \
              --geo-bypass \
              --ignore-errors \
              "${{ github.event.inputs.url }}" && {

              NEW_FILE=$(find "$FOLDER" -type f -newer marker -print -quit)

              if [ -n "$NEW_FILE" ]; then
                SUCCESS=true
                break
              fi
            }

            RETRY=$((RETRY+1))
            sleep 5
          done

          if [ "$SUCCESS" = false ]; then
            echo "Download failed"
            exit 1
          fi

          FILENAME=$(basename "$NEW_FILE")
          SIZE_BYTES=$(stat -c %s "$NEW_FILE")

          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "size_bytes=$SIZE_BYTES" >> $GITHUB_OUTPUT

      - name: Split file if needed
        shell: bash
        run: |
          FOLDER="${{ github.event.inputs.output_folder }}"
          FILE="${{ steps.download.outputs.filename }}"
          SIZE="${{ steps.download.outputs.size_bytes }}"

          SIZE_MB=$(echo "$SIZE / 1048576" | bc)
          THRESHOLD=49

          cd "$FOLDER"

          if (( $(echo "$SIZE_MB > $THRESHOLD" | bc -l) )); then
            echo "Splitting file..."

            RAND=$(openssl rand -hex 3)
            NAME="${{ github.event.inputs.archive_name }}_$RAND"

            rar a -v45m -m5 "${NAME}.rar" "$FILE"

            rm "$FILE"
          fi

      - name: Commit & push files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${{ github.event.inputs.output_folder }}/"
          git commit -m "Add downloaded files" || echo "Nothing to commit"
          git push

  summary-links:
    needs: download-and-maybe-split
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show links in GitHub Actions Summary
        shell: bash
        run: |
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          FOLDER="${{ github.event.inputs.output_folder }}"

          echo "## 📥 Download Links" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          FILES=$(find "$FOLDER" -type f)

          for FILE in $FILES; do
            RAW="https://raw.githubusercontent.com/$REPO/$BRANCH/$FILE"
            echo "- $RAW" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Done" >> $GITHUB_STEP_SUMMARY
