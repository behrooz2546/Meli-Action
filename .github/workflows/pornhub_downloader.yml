name: دانلودر پورن هاب

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL of the video'
        required: true
        type: string

      output_folder:
        description: 'Folder where the video will be saved'
        required: false
        type: string
        default: 'downloads'

      quality:
        description: 'Video quality (yt-dlp format selector)'
        required: true
        type: string
        default: 'bestvideo[height<=720]+bestaudio/best[ext=mp4]/best'

      archive_name:
        description: 'Base name for the RAR archive (if file is split)'
        required: false
        type: string
        default: 'video'

permissions:
  contents: write

jobs:
  download-and-maybe-split:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install yt-dlp and bc
        run: |
          pip install yt-dlp
          sudo apt-get update
          sudo apt-get install -y bc rar

      - name: Download video (retry up to 5 times)
        id: download
        shell: bash
        run: |
          FOLDER="${{ github.event.inputs.output_folder }}"
          mkdir -p "$FOLDER"

          touch marker

          MAX_RETRIES=5
          RETRY_COUNT=0
          SUCCESS=false

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Download attempt $((RETRY_COUNT+1))/$MAX_RETRIES"

            yt-dlp \
              --output "./$FOLDER/%(uploader)s - %(title)s - %(id)s.%(ext)s" \
              --format "${{ github.event.inputs.quality }}" \
              --merge-output-format mp4 \
              --retries 3 \
              --fragment-retries 10 \
              --no-check-certificate \
              --geo-bypass \
              --no-color \
              --ignore-errors \
              --newline \
              "${{ github.event.inputs.url }}" && {

                NEW_FILE=$(find "$FOLDER" -type f -newer marker -print -quit)

                if [ -n "$NEW_FILE" ]; then
                  echo "Download succeeded: $NEW_FILE"
                  SUCCESS=true
                  break
                else
                  echo "No new file found. Retrying..."
                fi
              } || {
                echo "Download failed with exit code $?"
              }

            RETRY_COUNT=$((RETRY_COUNT+1))

            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              echo "Waiting 5 seconds before retry..."
              sleep 5
            fi
          done

          if [ "$SUCCESS" = false ]; then
            echo "All download attempts failed."
            exit 1
          fi

          FILENAME=$(basename "$NEW_FILE")
          SIZE_BYTES=$(stat -c %s "$NEW_FILE")

          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "size_bytes=$SIZE_BYTES" >> $GITHUB_OUTPUT

      - name: Conditional split (if file > 49 MB)
        id: split
        shell: bash
        run: |
          FOLDER="${{ github.event.inputs.output_folder }}"
          FILENAME="${{ steps.download.outputs.filename }}"
          SIZE_BYTES="${{ steps.download.outputs.size_bytes }}"

          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)
          THRESHOLD_MB=49

          cd "$FOLDER"

          if (( $(echo "$SIZE_MB > $THRESHOLD_MB" | bc -l) )); then

            echo "File exceeds threshold. Splitting..."

            RANDOM_HEX=$(openssl rand -hex 3)
            ARCHIVE_NAME="${{ github.event.inputs.archive_name }}_${RANDOM_HEX}"

            echo "archive_name=$ARCHIVE_NAME" >> $GITHUB_OUTPUT

            rar a -v45m -m5 -ep1 "${ARCHIVE_NAME}.rar" "$FILENAME"

            rm "$FILENAME"

            echo "split_done=true" >> $GITHUB_OUTPUT

          else
            echo "File small enough. Keeping original."

            CLEAN_NAME=$(echo "$FILENAME" | sed -E 's/\.(mp4|mkv|webm|mov)$//')

            echo "archive_name=$CLEAN_NAME" >> $GITHUB_OUTPUT

            echo "split_done=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push files
        shell: bash
        run: |
          FOLDER="${{ github.event.inputs.output_folder }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "$FOLDER/"

          git commit -m "Add downloaded video files" || echo "Nothing to commit"

          git push

  generate-links:
    needs: download-and-maybe-split
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generate links file
        shell: bash
        run: |
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"

          FILES=$(git diff --name-only HEAD~1 HEAD)

          FIRST_FILE=$(echo "$FILES" | head -n 1)

          BASE_NAME=$(basename "$FIRST_FILE")

          BASE_NAME=$(echo "$BASE_NAME" | sed -E 's/(\.part[0-9]+\.rar|\.rar|\.mp4|\.mkv|\.webm|\.mov)$//')

          LINKS_FILE="links_${BASE_NAME}.txt"

          touch "$LINKS_FILE"

          echo "Generated links:" >> "$LINKS_FILE"
          echo "" >> "$LINKS_FILE"

          for FILE in $FILES; do
            if [ -f "$FILE" ]; then
              RAW_URL="https://raw.githubusercontent.com/$REPO/$BRANCH/$FILE"

              echo "$RAW_URL" >> "$LINKS_FILE"

              echo "$RAW_URL"
            fi
          done

          echo ""
          echo "Saved to $LINKS_FILE"

          cat "$LINKS_FILE"

      - name: Upload links artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-links
          path: links_*.txt
